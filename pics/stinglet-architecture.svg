<svg width="680" height="470" viewBox="0 0 680 470" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Stinglet architecture</title>
<desc>On a single host, a pod scheduled to this host is received by Stinglet (a modified kubelet), which delegates to a modified CRI-O, which uses a modified crun. These run on a modified Linux kernel managing normal memory and CXL memory; CXL memory may be an in-host expander or an external pool.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<style>
text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
.title { font-size: 14px; font-weight: 500; }
.sub { font-size: 12px; }
.box { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
.tier { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
.purple { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
.purple text { fill: #26215C; }
.teal { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
.teal text { fill: #04342C; }
.amber { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5; }
.amber text { fill: #412402; }
.gray text { fill: #2C2C2A; }
.host text { fill: #2C2C2A; }
.arr { stroke: #73726c; stroke-width: 1.5; fill: none; }
.dim { fill: #5F5E5A; }
</style>

<rect class="box host" x="40" y="50" width="600" height="404" rx="16"/>
<text class="title host" x="60" y="72" dominant-baseline="central">Single host</text>

<text class="sub dim" x="500" y="72" text-anchor="middle" dominant-baseline="central">Pod scheduled to this host</text>
<path d="M500 84 L500 116 L452 116" class="arr" marker-end="url(#arrow)"/>

<g class="purple">
<rect x="230" y="90" width="220" height="52" rx="8"/>
<text class="title" x="340" y="110" text-anchor="middle" dominant-baseline="central">Stinglet</text>
<text class="sub" x="340" y="128" text-anchor="middle" dominant-baseline="central">modified kubelet, host agent</text>
</g>

<line x1="340" y1="142" x2="340" y2="172" class="arr" marker-end="url(#arrow)"/>

<g class="teal">
<rect x="230" y="172" width="220" height="48" rx="8"/>
<text class="title" x="340" y="190" text-anchor="middle" dominant-baseline="central">CRI-O</text>
<text class="sub" x="340" y="207" text-anchor="middle" dominant-baseline="central">modified container runtime</text>
</g>

<line x1="340" y1="220" x2="340" y2="248" class="arr" marker-end="url(#arrow)"/>

<g class="teal">
<rect x="230" y="248" width="220" height="48" rx="8"/>
<text class="title" x="340" y="266" text-anchor="middle" dominant-baseline="central">crun</text>
<text class="sub" x="340" y="283" text-anchor="middle" dominant-baseline="central">CRI-O's runtime dependency</text>
</g>

<line x1="340" y1="296" x2="340" y2="324" class="arr" marker-end="url(#arrow)"/>

<g class="amber">
<rect x="70" y="324" width="540" height="112" rx="12"/>
<text class="title" x="340" y="344" text-anchor="middle" dominant-baseline="central">Modified Linux</text>
<text class="sub" x="340" y="362" text-anchor="middle" dominant-baseline="central">fine-grained tiered memory control</text>
<rect class="tier gray" x="92" y="382" width="220" height="42" rx="6"/>
<text class="title gray" x="202" y="398" text-anchor="middle" dominant-baseline="central">Normal memory</text>
<text class="sub gray" x="202" y="414" text-anchor="middle" dominant-baseline="central">host-local DRAM</text>
<rect class="tier gray" x="368" y="382" width="220" height="42" rx="6"/>
<text class="title gray" x="478" y="398" text-anchor="middle" dominant-baseline="central">CXL memory</text>
<text class="sub gray" x="478" y="414" text-anchor="middle" dominant-baseline="central">in-host expander or external pool</text>
</g>
</svg>
